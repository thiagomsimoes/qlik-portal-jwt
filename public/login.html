<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Analytics Login</title>
    <style>body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f6f9; }</style>
</head>
<body>
    <form action="/auth/login" method="POST" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2>Access Portal</h2>
        <input type="text" name="username" placeholder="Username (admin)" required style="display:block; width:100%; margin-bottom:10px; padding:8px;"><br>
        <input type="password" name="password" placeholder="Password (password)" required style="display:block; width:100%; margin-bottom:15px; padding:8px;"><br>
        <button type="submit" style="width:100%; padding:10px; background:#009845; color:white; border:none; cursor:pointer;">Login</button>
    </form>
</body>
</html>
